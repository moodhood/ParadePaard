services:
  auth-service-db:
    image: postgres:16.4
    environment:
      POSTGRES_DB: db
      POSTGRES_PASSWORD: password
      POSTGRES_USER: admin_user
    ports: ["5001:5432"]
    volumes: ["auth_db_data:/var/lib/postgresql/data"]

  user-service-db:
    image: postgres:16.4
    environment:
      POSTGRES_DB: db
      POSTGRES_PASSWORD: password
      POSTGRES_USER: admin_user
    ports: ["5002:5432"]
    volumes: ["user_db_data:/var/lib/postgresql/data"]

  payroll-service-db:
    image: postgres:16.4
    environment:
      POSTGRES_DB: db
      POSTGRES_PASSWORD: password
      POSTGRES_USER: admin_user
    ports: ["5000:5432"]
    volumes: ["payroll_db_data:/var/lib/postgresql/data"]

  timesheet-service-db:
    image: postgres:16.4
    environment:
      POSTGRES_DB: db
      POSTGRES_PASSWORD: password
      POSTGRES_USER: admin_user
    ports: ["5003:5432"]
    volumes: ["timesheet_db_data:/var/lib/postgresql/data"]

  contract-service-db:
    image: postgres:16.4
    environment:
      POSTGRES_DB: db
      POSTGRES_PASSWORD: password
      POSTGRES_USER: admin_user
    ports: ["5004:5432"]
    volumes: ["contract_db_data:/var/lib/postgresql/data"]

  planning-service-db:
    image: postgres:16.4
    environment:
      POSTGRES_DB: db
      POSTGRES_PASSWORD: password
      POSTGRES_USER: admin_user
    ports: ["5005:5432"]
    volumes: ["planning_db_data:/var/lib/postgresql/data"]

  kafka:
    image: apache/kafka:4.1.2
    environment:
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_NODE_ID: "0"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
    ports: ["9092:9092", "9094:9094"]

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    image: auth-service:latest
    environment:
      JWT_SECRET: "cc028f2d8dcf1c84ffbf92c9ed5255e8df01bc0ca4a760ebce999a8fdc8741ad"
      PASSWORD_RESET_FRONTEND_URL: "http://localhost:5173/reset-password"
      PASSWORD_RESET_HMAC_SECRET: "${PASSWORD_RESET_HMAC_SECRET:-e3f6c9a4d1b0b7e8f2c0a61d7d4f9b3a8c1e5b0d9a7f3c6e2b8d1a4f0c9e7b2d6a1f4c8b0e3d9a2c7f6b1d0e5a8c3f9b2d7e1c4a0b9d6f2c8a1e3b7d0c5a9f1b4e8d2c6a0f3b9d1e7c2a5f0b8d4c9e1a6}"
      SES_SMTP_HOST: "${SES_SMTP_HOST:-email-smtp.eu-north-1.amazonaws.com}"
      SES_SMTP_PORT: "${SES_SMTP_PORT:-587}"
      SES_SMTP_USERNAME: "${SES_SMTP_USERNAME:-}"
      SES_SMTP_PASSWORD: "${SES_SMTP_PASSWORD:-}"
      SES_FROM_EMAIL: "${SES_FROM_EMAIL:-noreply@lambdamanager.com}"
      
      SPRING_DATASOURCE_PASSWORD: "password"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://auth-service-db:5432/db"
      SPRING_DATASOURCE_USERNAME: "admin_user"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      SPRING_SQL_INIT_MODE: "always"
    depends_on: [auth-service-db, kafka]

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    image: user-service:latest
    environment:
      AUTH_SERVICE_BASE_URL: "http://api-gateway:4004"
      AUTH_SERVICE_ADDRESS: "auth-service"
      AUTH_SERVICE_GRPC_PORT: "9005"
      CONTRACT_SERVICE_BASE_URL: "http://api-gateway:4004"
      SPRING_DATASOURCE_PASSWORD: "password"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://user-service-db:5432/db"
      SPRING_DATASOURCE_USERNAME: "admin_user"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      SPRING_SQL_INIT_MODE: "always"
    depends_on: [user-service-db, kafka, api-gateway]

  timesheet-service:
    build:
      context: ./timesheet-service
      dockerfile: Dockerfile
    image: timesheet-service:latest
    environment:
      SPRING_DATASOURCE_PASSWORD: "password"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://timesheet-service-db:5432/db"
      SPRING_DATASOURCE_USERNAME: "admin_user"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_SQL_INIT_MODE: "always"
    depends_on: [timesheet-service-db]

  contract-service:
    build:
      context: ./contract-service
      dockerfile: Dockerfile
    image: contract-service:latest
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      SPRING_DATASOURCE_PASSWORD: "password"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://contract-service-db:5432/db"
      SPRING_DATASOURCE_USERNAME: "admin_user"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_SQL_INIT_MODE: "always"
      USER_SERVICE_ADDRESS: "user-service"
      USER_SERVICE_GRPC_PORT: "9006"
      USER_SERVICE_BASE_URL: "http://user-service:4006"
      CONTRACT_EMAIL_CONTRACT_URL: "http://localhost:5173/account/employment"
      SES_SMTP_HOST: "${SES_SMTP_HOST:-email-smtp.eu-north-1.amazonaws.com}"
      SES_SMTP_PORT: "${SES_SMTP_PORT:-587}"
      SES_SMTP_USERNAME: "${SES_SMTP_USERNAME:-}"
      SES_SMTP_PASSWORD: "${SES_SMTP_PASSWORD:-}"
      SES_FROM_EMAIL: "${SES_FROM_EMAIL:-noreply@lambdamanager.com}"
    depends_on: [contract-service-db, user-service, kafka]

  planning-service:
    build:
      context: ./planning-service
      dockerfile: Dockerfile
    image: planning-service:latest
    environment:
      JWT_SECRET: "cc028f2d8dcf1c84ffbf92c9ed5255e8df01bc0ca4a760ebce999a8fdc8741ad"
      TIMESHEET_SERVICE_ADDRESS: "timesheet-service"
      TIMESHEET_SERVICE_GRPC: "9001"
      USER_SERVICE_BASE_URL: "http://user-service:4006"
      SPRING_DATASOURCE_PASSWORD: "password"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://planning-service-db:5432/db"
      SPRING_DATASOURCE_USERNAME: "admin_user"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_SQL_INIT_MODE: "always"
    depends_on: [planning-service-db, timesheet-service]

  payroll-service:
    build:
      context: ./payroll-service
      dockerfile: Dockerfile
    image: payroll-service:latest
    environment:
      PAYSLIP_PAYOUT_DAY: "SUNDAY"
      PAYSLIP_PAYOUT_TIME: "12:00"
      PAYSLIP_TIME_ZONE: "Europe/Amsterdam"
      PAYSLIP_REVIEW_LEAD_DAYS: "2"
      CONTRACT_SERVICE_ADDRESS: "contract-service"
      CONTRACT_SERVICE_GRPC: "9002"
      TIMESHEET_SERVICE_ADDRESS: "timesheet-service"
      TIMESHEET_SERVICE_GRPC: "9001"
      USER_SERVICE_ADDRESS: "user-service"
      USER_SERVICE_GRPC: "9006"
      USER_SERVICE_BASE_URL: "http://user-service:4006"
      SPRING_DATASOURCE_PASSWORD: "password"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://payroll-service-db:5432/db"
      SPRING_DATASOURCE_USERNAME: "admin_user"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      SPRING_SQL_INIT_MODE: "always"
    depends_on: [payroll-service-db, contract-service, timesheet-service, user-service, kafka]

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: api-gateway:latest
    environment:
      AUTH_SERVICE_URL: "http://auth-service:4005"
    ports: ["4004:4004"]
    depends_on: [auth-service]

volumes:
  auth_db_data: {}
  user_db_data: {}
  payroll_db_data: {}
  timesheet_db_data: {}
  contract_db_data: {}
  planning_db_data: {}
