syntax = "proto3";

option java_multiple_files = true;
option java_package = "timesheet";

// Main service
service TimesheetService {
  rpc RequestTimesheetData (TimesheetDataRequest) returns (TimesheetDataResponse);
  rpc RequestLatestTimesheetSummary (LatestTimesheetSummaryRequest) returns (LatestTimesheetSummaryResponse);
  rpc RequestTimesheetSummariesForUser (TimesheetSummariesForUserRequest) returns (TimesheetSummariesForUserResponse);
  rpc ImportPlannedTimesheets (ImportPlannedTimesheetsRequest) returns (ImportPlannedTimesheetsResponse);
}

message TimesheetDataRequest {
  string userId = 1;
  string weekNumber = 2;
  string weekBasedYear = 3;
}

message TimesheetDataResponse {
  repeated Timesheet timesheets = 1;
}

message LatestTimesheetSummaryRequest {
  string userId = 1;
}

message TimesheetSummariesForUserRequest {
  string userId = 1;
}

message LatestTimesheetSummaryResponse {
  string timesheetId = 1;
  string dateOfIssue = 2;
  string weekNumber = 3;
  string weekBasedYear = 4;
  string shiftEndTime = 5;
}

message TimesheetSummariesForUserResponse {
  repeated LatestTimesheetSummaryResponse summaries = 1;
}

message Timesheet {
  string timesheetId = 1;
  string dateOfIssue = 2;
  string functionName = 3;
  string hoursWorked = 4;
  string travelExpenses = 5;
  string sourceProjectId = 6;
  string sourceShiftId = 7;
  string sourceScheduleEntryId = 8;
  string projectName = 9;
  string shiftName = 10;
  string shiftDate = 11;
  string shiftStartTime = 12;
  string shiftEndTime = 13;
  int32 breakMinutes = 14;
  string travelKilometers = 15;
  string travelRate = 16;
}

message ImportPlannedTimesheetsRequest {
  string source = 1;
  repeated PlannedTimesheetRecord records = 2;
}

message PlannedTimesheetRecord {
  string userId = 1;
  string dateOfIssue = 2;
  string name = 3;
  string function = 4;
  string hoursWorked = 5;
  string travelExpenses = 6;
  string sourceProjectId = 7;
  string sourceShiftId = 8;
  string sourceScheduleEntryId = 9;
  string projectName = 10;
  string shiftName = 11;
  string shiftDate = 12;
  string shiftStartTime = 13;
  string shiftEndTime = 14;
  int32 breakMinutes = 15;
  string travelKilometers = 16;
  string travelRate = 17;
}

message ImportPlannedTimesheetsResponse {
  int32 createdCount = 1;
  repeated string warnings = 2;
  int32 updatedCount = 3;
}

