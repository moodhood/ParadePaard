server:
  port: 4004

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
          ## http://localhost:4004/auth/login -> localhost:4004 is the address of the api gateway
          ## API GATEWAY -> http://auth-service:4005/login

            # Auth-Service
            - id: auth-service-route
              uri: http://auth-service:4005
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1
            - id: api-docs-auth-route
              uri: http://auth-service:4005
              predicates:
                - Path=/api-docs/auth
              filters:
                - RewritePath=/api-docs/auth,/v3/api-docs


            ## REST CLIENT -> http://localhost:4004/api/payroll
            ## API GATEWAY -> http://patient-service:4000/payroll
            ## PATIENT SERVICE (SPRING BOOT APP) -> /payroll -> Payroll array

            # User-Service
            - id: user-service-route
              uri: http://user-service:4006
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1
                - JwtValidation
            - id: api-docs-user-route
              uri: http://user-service:4006
              predicates:
                - Path=/api-docs/patients
              filters:
                - RewritePath=/api-docs/users,/v3/api-doc

            # Payroll-Service
            - id: payroll-service-route
              uri: http://payroll-service:4000
              predicates:
                - Path=/api/payroll/**
              filters:
                - StripPrefix=1
                - JwtValidation
            - id: api-docs-payroll-route
              uri: http://payroll-service:4000
              predicates:
                - Path=/api-docs/payroll
              filters:
                - RewritePath=/api-docs/payroll,/v3/api-docs

            # Timesheet-Service
            - id: timesheet-service-route
              uri: http://timesheet-service:4001
              predicates:
                - Path=/api/timesheet/**
              filters:
                - StripPrefix=1
                - JwtValidation
            - id: api-docs-timesheet-route
              uri: http://timesheet-service:4001
              predicates:
                - Path=/api-docs/timesheet
              filters:
                - RewritePath=/api-docs/timesheet,/v3/api-docs



              ## REST-CLIENT -> http://localhost:4004/api-docs/patients
              ## API-GATEWAY -> http://patient-service:4000/v3/api-docs