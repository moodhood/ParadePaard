server:
  port: 4004

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
          ## http://localhost:4004/auth/login -> localhost:4004 is the address of the api gateway
          ## API GATEWAY -> http://auth-service:4005/login

            - id: auth-service-route
              uri: http://auth-service:4005
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1
            - id: api-docs-auth-route
              uri: http://auth-service:4005
              predicates:
                - Path=/api-docs/auth
              filters:
                - RewritePath=/api-docs/auth,/v3/api-docs


            ## REST CLIENT -> http://localhost:4004/api/patients
            ## API GATEWAY -> http://patient-service:4000/patients
            ## PATIENT SERVICE (SPRING BOOT APP) -> /patients -> Patients array
            - id: patient-service-route
              uri: http://patient-service:4000
              predicates:
                - Path=/api/patients/**
              filters:
                - StripPrefix=1
                - JwtValidation
            - id: api-docs-patient-route
              uri: http://patient-service:4000
              predicates:
                - Path=/api-docs/patients
              filters:
                - RewritePath=/api-docs/patients,/v3/api-docs


            - id: user-service-route
              uri: http://user-service:4006
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1
                - JwtValidation
            - id: api-docs-user-route
              uri: http://user-service:4006
              predicates:
                - Path=/api-docs/patients
              filters:
                - RewritePath=/api-docs/users,/v3/api-docs



              ## REST-CLIENT -> http://localhost:4004/api-docs/patients
              ## API-GATEWAY -> http://patient-service:4000/v3/api-docs