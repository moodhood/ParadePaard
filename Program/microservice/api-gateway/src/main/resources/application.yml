server:
  port: 4004

auth:
  service:
    url: http://auth-service:4005

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins:
                  - "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
                maxAge: 3600
          routes:
            # Public Auth Endpoints - No JWT validation
            - id: auth-service-login
              uri: http://auth-service:4005
              predicates:
                - Path=/auth/login
              filters:
                - StripPrefix=1

            - id: auth-service-register
              uri: http://auth-service:4005
              predicates:
                - Path=/auth/register
              filters:
                - StripPrefix=1

            - id: auth-service-refresh
              uri: http://auth-service:4005
              predicates:
                - Path=/auth/refresh
              filters:
                - StripPrefix=1

            - id: auth-service-validate
              uri: http://auth-service:4005
              predicates:
                - Path=/auth/validate
              filters:
                - StripPrefix=1

            - id: auth-service-logout
              uri: http://auth-service:4005
              predicates:
                - Path=/auth/logout
              filters:
                - StripPrefix=1

            # Protected Auth Endpoints - With JWT validation
            - id: auth-service-protected
              uri: http://auth-service:4005
              predicates:
                - Path=/auth/is-admin,/auth/change-password,/auth/profile,/auth/me
              filters:
                - StripPrefix=1
                - JwtValidation

            # API Docs for Auth Service
            - id: api-docs-auth-route
              uri: http://auth-service:4005
              predicates:
                - Path=/api-docs/auth
              filters:
                - RewritePath=/api-docs/auth,/v3/api-docs

            # User-Service - Protected
            - id: user-service-route
              uri: http://user-service:4006
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1
                - JwtValidation

            - id: api-docs-user-route
              uri: http://user-service:4006
              predicates:
                - Path=/api-docs/user
              filters:
                - RewritePath=/api-docs/users,/v3/api-doc

            # Payroll-Service - Protected
            - id: payroll-service-route
              uri: http://payroll-service:4000
              predicates:
                - Path=/api/payroll/**
              filters:
                - StripPrefix=1
                - JwtValidation

            - id: api-docs-payroll-route
              uri: http://payroll-service:4000
              predicates:
                - Path=/api-docs/payroll
              filters:
                - RewritePath=/api-docs/payroll,/v3/api-docs

            # Timesheet-Service - Protected
            - id: timesheet-service-route
              uri: http://timesheet-service:4001
              predicates:
                - Path=/api/timesheet/**
              filters:
                - StripPrefix=1
                - JwtValidation

            - id: api-docs-timesheet-route
              uri: http://timesheet-service:4001
              predicates:
                - Path=/api-docs/timesheet
              filters:
                - RewritePath=/api-docs/timesheet,/v3/api-docs

            # Contract-Service - Protected
            - id: contract-service-route
              uri: http://contract-service:4002
              predicates:
                - Path=/api/contract/**
              filters:
                - StripPrefix=1
                - JwtValidation

            - id: api-docs-contract-route
              uri: http://contract-service:4002
              predicates:
                - Path=/api-docs/contract
              filters:
                - RewritePath=/api-docs/contract,/v3/api-docs

# Enable debug logging for troubleshooting
logging:
  level:
    com.pm.apigateway.filter: DEBUG
    org.springframework.cloud.gateway: DEBUG
    ROOT: INFO