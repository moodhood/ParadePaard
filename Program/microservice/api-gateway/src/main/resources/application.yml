server:
  port: 4004

spring:
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins:
                  - "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: auth-service-route
              uri: http://auth-service:4005
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1

            - id: user-service-route
              uri: http://user-service:4006
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1
                - JwtValidation

            - id: payroll-service-route
              uri: http://payroll-service:4000
              predicates:
                - Path=/api/payroll/**
              filters:
                - StripPrefix=1
                - JwtValidation

            - id: timesheet-service-route
              uri: http://timesheet-service:4001
              predicates:
                - Path=/api/timesheet/**
              filters:
                - StripPrefix=1
                - JwtValidation

            - id: contract-service-route
              uri: http://contract-service:4002
              predicates:
                - Path=/api/contract/**
              filters:
                - StripPrefix=1
                - JwtValidation
