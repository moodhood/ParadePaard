# Test profile overrides (overlaid on top of the main application.yml).
#
# Tests run against an in-memory H2 database. Flyway is disabled here because
# the production migrations under db/migration use PostgreSQL-specific syntax
# (dollar-quoted DO blocks, bytea, etc.); for tests we let Hibernate build the
# schema directly from the entities instead.
spring:
  datasource:
    url: jdbc:h2:mem:planningdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  sql:
    init:
      mode: never
