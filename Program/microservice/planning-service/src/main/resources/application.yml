server:
  port: 4010

spring:
  application:
    name: planning-service
  jpa:
    hibernate:
      # Schema is owned by Flyway. Hibernate only validates that the entities
      # match the migrated schema; it never alters the database.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB
  sql:
    init:
      # data.sql has been replaced by Flyway migrations under db/migration.
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    # The existing database was created by Hibernate before Flyway was adopted.
    # baseline-on-migrate stamps that pre-existing schema as version 1 (so V1 is
    # not re-run against it) and then applies V2 onwards. Fresh databases run
    # every migration from V1.
    baseline-on-migrate: true
    baseline-version: 1

jwt:
  secret: ${JWT_SECRET:cc028f2d8dcf1c84ffbf92c9ed5255e8df01bc0ca4a760ebce999a8fdc8741ad}

timesheet:
  service:
    address: ${TIMESHEET_SERVICE_ADDRESS:localhost}
    grpc:
      port: ${TIMESHEET_SERVICE_GRPC:9001}

user:
  service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:4006}
