spring.application.name=contract-service
spring.jpa.defer-datasource-initialization=true
server.port=4002
grpc.server.port=9002
logging.level.root=info
contract.service.address=localhost
contract.service.grpc.port=9002
user.service.address=localhost
user.service.grpc.port=9006
contract.email.contract-url=${CONTRACT_EMAIL_CONTRACT_URL:http://localhost:5173}

spring.mail.host=${SES_SMTP_HOST:email-smtp.eu-north-1.amazonaws.com}
spring.mail.port=${SES_SMTP_PORT:587}
spring.mail.username=${SES_SMTP_USERNAME:}
spring.mail.password=${SES_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.checkserveridentity=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=20000
spring.mail.properties.mail.smtp.writetimeout=20000
email.from-address=${SES_FROM_EMAIL:noreply@lambdamanager.com}

# Kafka (avoid 60s request hangs when broker is unreachable)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.properties.max.block.ms=5000
