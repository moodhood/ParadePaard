spring.application.name=contract-service
spring.jpa.defer-datasource-initialization=true
server.port=4002
grpc.server.port=9002
logging.level.root=info
contract.service.address=localhost
contract.service.grpc.port=9002
user.service.address=localhost
user.service.grpc.port=9006
contract.email.contract-url=${CONTRACT_EMAIL_CONTRACT_URL:http://localhost:5173}
contract.email.from-email=${CONTRACT_EMAIL_FROM_EMAIL:noreply@lambdamanager.com}
mailersend.api-token=${MAILERSEND_API_TOKEN:}
mailersend.api-url=${MAILERSEND_API_URL:https://api.mailersend.com/v1/email}

# Kafka (avoid 60s request hangs when broker is unreachable)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.properties.max.block.ms=5000
