syntax = "proto3";

option java_multiple_files = true;
option java_package = "contract";

// Main service
service ContractService {
  rpc RequestContractData (ContractDataRequest) returns (ContractDataResponse);
}

// Request contract data for a user
message ContractDataRequest {
  string userId = 1;
}

// Response with snapshot of contract
message ContractDataResponse {
  string startDate = 1;
  string endDate = 2;
  string contractType = 3;
  string grossHourlyWage = 4; // keep as string to avoid decimal loss
  bool travelAllowance = 5;
}
