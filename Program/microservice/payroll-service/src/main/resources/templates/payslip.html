<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Payslip</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        :root { --pad:16px; --gap:12px; --radius:12px; --border:1px solid #e5e7eb; --text:#111827; --muted:#6b7280; --bg:#ffffff; --bg_alt:#f9fafb; }
        * { box-sizing:border-box; }
        html, body { margin:0; color:var(--text); background:var(--bg); font:14px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
        .page { max-width:900px; margin:24px auto; padding:var(--pad); }
        .card { background:#fff; border:var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:0 1px 2px rgba(0,0,0,0.04); }
        .header { display:flex; justify-content:space-between; align-items:flex-start; padding:20px; background:var(--bg_alt); border-bottom:var(--border); }
        .hdr_left h1 { font-size:22px; margin:0 0 4px 0; }
        .hdr_left .sub { color:var(--muted); font-size:13px; }
        .hdr_right { text-align:right; }
        .pill { display:inline-block; padding:6px 10px; border-radius:999px; background:#eef2ff; color:#3730a3; font-weight:600; font-size:12px; }
        .section { padding:20px; display:grid; gap:var(--gap); }
        .grid_two { display:grid; grid-template-columns:1fr 1fr; gap:var(--gap); }
        .box { border:var(--border); border-radius:10px; padding:14px; background:#fff; }
        .box h3 { margin:0 0 8px 0; font-size:14px; }
        .meta { display:grid; grid-template-columns:140px 1fr; gap:6px 12px; font-size:13px; }
        .meta .label { color:var(--muted); }
        table { width:100%; border-collapse:collapse; }
        thead th { text-align:left; font-size:12px; color:var(--muted); font-weight:600; padding:10px 12px; background:var(--bg_alt); border-bottom:var(--border); }
        tbody td { padding:10px 12px; border-bottom:var(--border); vertical-align:top; }
        .num { text-align:right; white-space:nowrap; }
        .muted { color:var(--muted); }
        .totals { display:grid; grid-template-columns:1fr 260px; gap:var(--gap); margin-top:8px; }
        .totals .sum { border:var(--border); border-radius:10px; }
        .sum_row { display:grid; grid-template-columns:1fr auto; padding:10px 14px; }
        .sum_row + .sum_row { border-top:var(--border); }
        .sum_row.total { font-weight:700; background:#f0fdf4; }
        @media print { @page { size:A4; margin:12mm; } }
    </style>
</head>
<body>
<div class="page">
    <div class="card" id="payslipCard">
        <div class="header">
            <div class="hdr_left">
                <h1>Payslip</h1>
                <div class="sub" id="payslipId"></div>
            </div>
            <div class="hdr_right">
                <div class="pill" id="dateOfIssue"></div>
                <div class="muted" id="weekInfo"></div>
            </div>
        </div>

        <div class="section grid_two">
            <div class="box">
                <h3>Employee</h3>
                <div class="meta">
                    <div class="label">Name</div><div id="name"></div>
                    <div class="label">Date of birth</div><div id="dob"></div>
                    <div class="label">Address</div><div id="address"></div>
                    <div class="label">City</div><div id="city"></div>
                    <div class="label">Country</div><div id="country"></div>
                    <div class="label">User id</div><div><code id="userId"></code></div>
                </div>
            </div>
            <div class="box">
                <h3>Contract</h3>
                <div class="meta">
                    <div class="label">Start date</div><div id="startDate"></div>
                    <div class="label">Function</div><div id="functionName"></div>
                    <div class="label">Hourly wage</div><div id="hourlyWage"></div>
                    <div class="label">Week number</div><div id="weekNumber"></div>
                    <div class="label">Year</div><div id="weekYear"></div>
                </div>
            </div>
        </div>

        <div class="section">
            <h3 style="margin:0 0 6px 0;">Work summary</h3>
            <div class="box" style="padding:0;">
                <table id="lines">
                    <thead>
                    <tr>
                        <th>Function</th>
                        <th class="num">Hours</th>
                        <th class="num">Rate</th>
                        <th class="num">Travel</th>
                        <th class="num">Line total</th>
                    </tr>
                    </thead>
                    <tbody id="linesBody"></tbody>
                </table>
            </div>

            <div class="totals">
                <div></div>
                <div class="sum">
                    <div class="sum_row"><div>Gross</div><div class="num" id="gross"></div></div>
                    <div class="sum_row"><div>Wage tax</div><div class="num" id="tax"></div></div>
                    <div class="sum_row"><div>Travel</div><div class="num" id="travel"></div></div>
                    <div class="sum_row total"><div>Net</div><div class="num" id="net"></div></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script id="payload" type="application/json">__PAYSLIP_JSON__</script>
<script>
    function money(n){ const num=Number(n||0); return new Intl.NumberFormat('nl-NL',{style:'currency',currency:'EUR'}).format(num); }
    function fmtDate(s){ if(!s) return ''; const d=new Date(s); if(Number.isNaN(d.getTime())) return s; return d.toLocaleDateString('nl-NL',{year:'numeric',month:'2-digit',day:'2-digit'}); }
    function safe(v){ return v ?? ''; }
    function render(dto){
        document.getElementById('payslipId').textContent = 'ID ' + safe(dto.payslipId);
        document.getElementById('dateOfIssue').textContent = 'Issued ' + fmtDate(dto.dateOfIssue);
        document.getElementById('weekInfo').textContent = 'Week ' + safe(dto.weekNumber) + ' of ' + safe(dto.weekBasedYear);
        document.getElementById('name').textContent = safe(dto.name);
        document.getElementById('dob').textContent = fmtDate(dto.dateOfBirth);
        const addr=[dto.streetName,dto.houseNumber,dto.houseNumberSuffix].filter(Boolean).join(' ');
        const zip=[dto.postalCode].filter(Boolean).join(' ');
        document.getElementById('address').textContent=[addr,zip].filter(Boolean).join(', ');
        document.getElementById('city').textContent=safe(dto.city);
        document.getElementById('country').textContent=safe(dto.country);
        document.getElementById('userId').textContent=safe(dto.userId);
        document.getElementById('startDate').textContent=fmtDate(dto.startDate);
        document.getElementById('functionName').textContent=safe(dto.functionName);
        document.getElementById('hourlyWage').textContent=money(dto.hourlyWage);
        document.getElementById('weekNumber').textContent=safe(dto.weekNumber);
        document.getElementById('weekYear').textContent=safe(dto.weekBasedYear);

        const body=document.getElementById('linesBody'); body.innerHTML='';
        const hours=Number(dto.totalHoursWorked||0);
        const rate=Number(dto.hourlyWage||0);
        const travel=Number(dto.travelExpenses||0);
        const total=hours*rate+travel;
        body.insertAdjacentHTML('beforeend', `<tr>
          <td>${safe(dto.functionName)}</td>
          <td class="num">${hours.toFixed(2)}</td>
          <td class="num">${money(rate)}</td>
          <td class="num">${money(travel)}</td>
          <td class="num">${money(total)}</td>
        </tr>`);

        document.getElementById('gross').textContent=money(dto.totalGrossAmount);
        document.getElementById('tax').textContent=money(dto.wageTaxWithheldTest);
        document.getElementById('travel').textContent=money(dto.travelExpenses);
        document.getElementById('net').textContent=money(dto.totalNetAmount);
    }
    const dto=JSON.parse(document.getElementById('payload').textContent); render(dto);
</script>
</body>
</html>
