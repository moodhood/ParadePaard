spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer

password-reset.token-ttl=PT15M
password-reset.frontend-reset-url=${PASSWORD_RESET_FRONTEND_URL:http://localhost:5173/reset-password}
password-reset.hmac-secret=${PASSWORD_RESET_HMAC_SECRET:e3f6c9a4d1b0b7e8f2c0a61d7d4f9b3a8c1e5b0d9a7f3c6e2b8d1a4f0c9e7b2d6a1f4c8b0e3d9a2c7f6b1d0e5a8c3f9b2d7e1c4a0b9d6f2c8a1e3b7d0c5a9f1b4e8d2c6a0f3b9d1e7c2a5f0b8d4c9e1a6}

spring.mail.host=${SES_SMTP_HOST:email-smtp.eu-north-1.amazonaws.com}
spring.mail.port=${SES_SMTP_PORT:587}
spring.mail.username=${SES_SMTP_USERNAME:}
spring.mail.password=${SES_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.checkserveridentity=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=20000
spring.mail.properties.mail.smtp.writetimeout=20000
email.from-address=${SES_FROM_EMAIL:noreply@lambdamanager.com}

server.port=4005
grpc.server.port=9005
